name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-system-aarch64 qemu-utils cloud-image-utils

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil requests pytest pytest-mock

    - name: Create dummy image for integration tests
      run: |
        mkdir -p tests
        qemu-img create -f qcow2 tests/dummy.qcow2 1M

    - name: Run tests
      run: |
        pytest tests/integration_test_docker_vm.py
