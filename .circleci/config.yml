version: 2.1

jobs:
  test:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout

      - run:
          name: Set up Python 3.10
          command: |
            pyenv install -s 3.10
            pyenv global 3.10
            python --version

      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y qemu-system-aarch64 qemu-utils cloud-image-utils openssh-client

      - run:
          name: Install gVisor (runsc)
          command: |
            curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/gvisor-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/gvisor-archive-keyring.gpg] https://storage.googleapis.com/gvisor/releases release main" \
              | sudo tee /etc/apt/sources.list.d/gvisor.list
            sudo apt-get update
            sudo apt-get install -y runsc
            sudo runsc install
            sudo systemctl restart docker

      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            pip install psutil requests pytest pytest-mock

      - run:
          name: Create dummy image for integration tests
          command: |
            mkdir -p tests
            qemu-img create -f qcow2 tests/dummy.qcow2 1M

      - run:
          name: Run tests inside gVisor container
          command: |
            docker run --rm --runtime=runsc \
              -v "$(pwd)":/workspace -w /workspace \
              python:3.10-slim \
              bash -c "pip install --quiet psutil requests pytest pytest-mock && pytest tests/integration_test_docker_vm.py"

workflows:
  ci:
    jobs:
      - test:
          filters:
            branches:
              only:
                - main
                - /pull\/.*/
