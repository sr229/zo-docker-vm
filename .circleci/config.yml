version: 2.1

jobs:
  test:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout

      - run:
          name: Set up Python 3.10
          command: |
            pyenv install -s 3.10
            pyenv global 3.10
            python --version

      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y qemu-system-aarch64 qemu-utils cloud-image-utils openssh-client

      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            pip install psutil requests pytest pytest-mock

      - run:
          name: Create dummy image for integration tests
          command: |
            mkdir -p tests
            qemu-img create -f qcow2 tests/dummy.qcow2 1M

      - run:
          name: Run tests
          command: |
            pytest tests/integration_test_docker_vm.py

workflows:
  ci:
    jobs:
      - test:
          filters:
            branches:
              only:
                - main
                - /pull\/.*/
